<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChaosTech NSD - Live RF Monitor</title>
<style>
:root {
  --color-bg-base: #0f172a;
  --color-bg-elevated: #020617;
  --color-bg-surface: #1e293b;
  --color-text-primary: #f1f5f9;
  --color-text-secondary: #cbd5e1;
  --color-text-accent: #38bdf8;
  --color-primary: #38bdf8;
  --color-success: #10b981;
  --color-warning: #f59e0b;
  --color-error: #ef4444;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Courier New', monospace;
  background: var(--color-bg-base);
  color: var(--color-text-primary);
  font-size: 14px;
  line-height: 1.5;
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px;
}

.header {
  background: var(--color-error);
  color: white;
  text-align: center;
  padding: 12px;
  font-weight: bold;
  letter-spacing: 2px;
  margin-bottom: 20px;
}

.status-bar {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
  padding: 15px;
  background: var(--color-bg-surface);
  border-radius: 8px;
}

.status-item {
  flex: 1;
}

.status-label {
  color: var(--color-text-secondary);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 5px;
}

.status-value {
  color: var(--color-primary);
  font-size: 20px;
  font-weight: bold;
}

.status-online {
  color: var(--color-success);
}

.status-offline {
  color: var(--color-error);
}

.grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
  margin-bottom: 20px;
}

.panel {
  background: var(--color-bg-surface);
  border-radius: 8px;
  padding: 20px;
}

.panel-title {
  color: var(--color-primary);
  font-size: 16px;
  font-weight: bold;
  letter-spacing: 1px;
  margin-bottom: 15px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--color-bg-base);
}

canvas {
  width: 100%;
  height: 400px;
  background: var(--color-bg-elevated);
  border-radius: 4px;
}

.rf-bands {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.rf-band {
  display: flex;
  align-items: center;
  gap: 10px;
}

.rf-label {
  color: var(--color-text-secondary);
  width: 100px;
  font-size: 12px;
}

.rf-bar-bg {
  flex: 1;
  height: 24px;
  background: var(--color-bg-elevated);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}

.rf-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--color-primary), var(--color-success));
  transition: width 0.5s ease;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 8px;
  font-size: 11px;
  font-weight: bold;
  color: var(--color-bg-base);
}

.peak-list {
  max-height: 300px;
  overflow-y: auto;
}

.peak-item {
  background: var(--color-bg-elevated);
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 4px;
  border-left: 3px solid var(--color-primary);
}

.peak-freq {
  color: var(--color-primary);
  font-weight: bold;
  font-size: 15px;
}

.peak-power {
  color: var(--color-text-secondary);
  font-size: 12px;
  margin-top: 3px;
}

.controls {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.btn {
  flex: 1;
  padding: 12px;
  background: var(--color-bg-elevated);
  color: var(--color-primary);
  border: 1px solid var(--color-primary);
  border-radius: 4px;
  cursor: pointer;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  font-weight: bold;
  letter-spacing: 1px;
  transition: all 0.2s;
}

.btn:hover {
  background: var(--color-primary);
  color: var(--color-bg-base);
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

::-webkit-scrollbar {
  width: 6px;
}

::-webkit-scrollbar-thumb {
  background: var(--color-primary);
  border-radius: 3px;
}

::-webkit-scrollbar-track {
  background: var(--color-bg-elevated);
}
</style>
</head>
<body>

<div class="header">
  &#9651; ChaosTech NSD - LIVE RF SPECTRUM MONITOR &#9651;
</div>

<div class="container">
  
  <div class="status-bar">
    <div class="status-item">
      <div class="status-label">API Status</div>
      <div class="status-value" id="bridgeStatus">
        <span class="status-offline">OFFLINE</span>
      </div>
    </div>
    <div class="status-item">
      <div class="status-label">Center Frequency</div>
      <div class="status-value" id="centerFreq">1090 MHz</div>
    </div>
    <div class="status-item">
      <div class="status-label">Noise Floor</div>
      <div class="status-value" id="noiseFloor">-- dB</div>
    </div>
    <div class="status-item">
      <div class="status-label">Active Peaks</div>
      <div class="status-value" id="peakCount">0</div>
    </div>
  </div>

  <div class="grid">
    
    <div class="panel">
      <div class="panel-title">&#9632; RF SPECTRUM (1089-1091 MHz)</div>
      <canvas id="spectrumChart"></canvas>
      <div class="controls">
        <button class="btn" onclick="changeBand(433)">433 MHz</button>
        <button class="btn" onclick="changeBand(900)">900 MHz</button>
        <button class="btn" onclick="changeBand(1090)">1090 MHz</button>
        <button class="btn" onclick="changeBand(2400)">2.4 GHz</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">&#9632; DETECTED PEAKS</div>
      <div class="peak-list" id="peakList">
        <div style="color: var(--color-text-secondary); text-align: center; padding: 20px;">
          Waiting for data...
        </div>
      </div>
    </div>

  </div>

  <div class="panel">
    <div class="panel-title">&#9632; BAND ACTIVITY DISTRIBUTION</div>
    <div class="rf-bands">
      <div class="rf-band">
        <div class="rf-label">433 MHz</div>
        <div class="rf-bar-bg">
          <div class="rf-bar-fill" id="band433" style="width: 0%">
            <span id="count433">0</span>
          </div>
        </div>
      </div>
      <div class="rf-band">
        <div class="rf-label">900 MHz</div>
        <div class="rf-bar-bg">
          <div class="rf-bar-fill" id="band900" style="width: 0%">
            <span id="count900">0</span>
          </div>
        </div>
      </div>
      <div class="rf-band">
        <div class="rf-label">1090 MHz</div>
        <div class="rf-bar-bg">
          <div class="rf-bar-fill" id="band1090" style="width: 0%">
            <span id="count1090">0</span>
          </div>
        </div>
      </div>
      <div class="rf-band">
        <div class="rf-label">2.4 GHz</div>
        <div class="rf-bar-bg">
          <div class="rf-bar-fill" id="band2400" style="width: 0%">
            <span id="count2400">0</span>
          </div>
        </div>
      </div>
      <div class="rf-band">
        <div class="rf-label">Other</div>
        <div class="rf-bar-bg">
          <div class="rf-bar-fill" id="bandOther" style="width: 0%">
            <span id="countOther">0</span>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
const API_BASE = 'http://localhost:8000';
let currentCenter = 1090;
let currentSpan = 2.0;

const canvas = document.getElementById('spectrumChart');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function drawSpectrum(freqs, powers, peaks) {
  const W = canvas.width;
  const H = canvas.height;
  
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#020617';
  ctx.fillRect(0, 0, W, H);
  
  if (freqs.length === 0) return;
  
  const minFreq = freqs.reduce((a, b) => a < b ? a : b);
  const maxFreq = freqs.reduce((a, b) => a > b ? a : b);
  const minPower = powers.reduce((a, b) => a < b ? a : b);
  const maxPower = powers.reduce((a, b) => a > b ? a : b);
  
  const padding = 40;
  const graphW = W - padding * 2;
  const graphH = H - padding * 2;
  
  // Grid lines
  ctx.strokeStyle = 'rgba(56, 189, 248, 0.2)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 10; i++) {
    const y = padding + (graphH / 10) * i;
    ctx.beginPath();
    ctx.moveTo(padding, y);
    ctx.lineTo(W - padding, y);
    ctx.stroke();
  }
  
  // Frequency axis
  ctx.strokeStyle = 'rgba(56, 189, 248, 0.3)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(padding, H - padding);
  ctx.lineTo(W - padding, H - padding);
  ctx.stroke();
  
  // Power axis
  ctx.beginPath();
  ctx.moveTo(padding, padding);
  ctx.lineTo(padding, H - padding);
  ctx.stroke();
  
  // Spectrum line
  ctx.strokeStyle = '#38bdf8';
  ctx.lineWidth = 2;
  ctx.beginPath();
  
  freqs.forEach((freq, i) => {
    const x = padding + ((freq - minFreq) / (maxFreq - minFreq)) * graphW;
    const y = H - padding - ((powers[i] - minPower) / (maxPower - minPower)) * graphH;
    
    if (i === 0) {
      ctx.moveTo(x, y);
    } else {
      ctx.lineTo(x, y);
    }
  });
  ctx.stroke();
  
  // Fill under curve
  ctx.lineTo(W - padding, H - padding);
  ctx.lineTo(padding, H - padding);
  ctx.closePath();
  ctx.fillStyle = 'rgba(56, 189, 248, 0.1)';
  ctx.fill();
  
  // Peak markers
  peaks.forEach(peak => {
    const x = padding + ((peak.freq_mhz - minFreq) / (maxFreq - minFreq)) * graphW;
    const y = H - padding - ((peak.power_db - minPower) / (maxPower - minPower)) * graphH;
    
    ctx.fillStyle = '#10b981';
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.strokeStyle = '#10b981';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x, H - padding);
    ctx.stroke();
  });
  
  // Axis labels
  ctx.fillStyle = '#cbd5e1';
  ctx.font = '11px Courier New';
  ctx.textAlign = 'center';
  
  // Frequency labels
  for (let i = 0; i <= 4; i++) {
    const freq = minFreq + ((maxFreq - minFreq) / 4) * i;
    const x = padding + (graphW / 4) * i;
    ctx.fillText(freq.toFixed(1), x, H - padding + 20);
  }
  
  // Power labels
  ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) {
    const power = minPower + ((maxPower - minPower) / 4) * i;
    const y = H - padding - (graphH / 4) * i;
    ctx.fillText(power.toFixed(0), padding - 10, y + 4);
  }
}

function updateBandDistribution(peaks) {
  const bands = {
    '433': 0,
    '900': 0,
    '1090': 0,
    '2400': 0,
    'other': 0
  };
  
  peaks.forEach(peak => {
    const f = peak.freq_mhz;
    if (f >= 420 && f <= 450) bands['433']++;
    else if (f >= 880 && f <= 930) bands['900']++;
    else if (f >= 1080 && f <= 1100) bands['1090']++;
    else if (f >= 2400 && f <= 2500) bands['2400']++;
    else bands['other']++;
  });
  
  const total = Math.max(peaks.length, 1);
  
  ['433', '900', '1090', '2400', 'other'].forEach(band => {
    const bandKey = band === 'other' ? 'Other' : band;
    const count = bands[band];
    const pct = Math.round((count / total) * 100);
    
    document.getElementById(`band${bandKey}`).style.width = pct + '%';
    document.getElementById(`count${bandKey}`).textContent = count;
  });
}

function updatePeakList(peaks) {
  const container = document.getElementById('peakList');
  
  if (peaks.length === 0) {
    container.innerHTML = '<div style="color: var(--color-text-secondary); text-align: center; padding: 20px;">No peaks detected</div>';
    return;
  }
  
  const sorted = peaks.slice().sort((a, b) => b.power_db - a.power_db);
  
  container.innerHTML = sorted.map(peak => `
    <div class="peak-item">
      <div class="peak-freq">${peak.freq_mhz.toFixed(3)} MHz</div>
      <div class="peak-power">Power: ${peak.power_db.toFixed(1)} dBm</div>
    </div>
  `).join('');
}

let fetching = false;

async function fetchSpectrum() {
  if (fetching) return;
  fetching = true;

  try {
    const url = `${API_BASE}/api/psd_scan?center_mhz=${currentCenter}&span_mhz=${currentSpan}`;
    const resp = await fetch(url);

    if (!resp.ok) {
      let errPayload = null;
      try { errPayload = await resp.json(); } catch (_) {}
      if (resp.status === 503) {
        console.warn('SDR busy:', errPayload?.error || '');
        document.getElementById('bridgeStatus').innerHTML =
          '<span class="status-online">SDR BUSY</span>';
      } else {
        document.getElementById('bridgeStatus').innerHTML =
          '<span class="status-offline">OFFLINE</span>';
      }
      return; // finally still runs here
    }

    const data = await resp.json();

    document.getElementById('bridgeStatus').innerHTML =
      '<span class="status-online">ONLINE</span>';
    document.getElementById('centerFreq').textContent =
      `${data.center_mhz.toFixed(0)} MHz`;
    document.getElementById('noiseFloor').textContent =
      `${data.noise_floor_db.toFixed(1)} dB`;
    document.getElementById('peakCount').textContent = data.peaks.length;

    const freqs  = data.points.map(p => p.freq_mhz);
    const powers = data.points.map(p => p.power_db);
    const peaks  = data.peaks;

    drawSpectrum(freqs, powers, peaks);
    updateBandDistribution(peaks);
    updatePeakList(peaks);

  } catch (err) {
    console.error('Spectrum fetch failed:', err.message);
    document.getElementById('bridgeStatus').innerHTML =
      '<span class="status-offline">OFFLINE</span>';
  } finally {
    fetching = false; // ALWAYS reset — even after early return
  }
}

setInterval(fetchSpectrum, 2000);
fetchSpectrum();
</script>

</body>
</html>
